<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ukraine Conflict — Data Visualization</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- D3 -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

  <!-- css -->
  <link rel="stylesheet" href="css/style.css">

  <!-- javascript -->
  <script src="js/map.js" defer></script>
  <script src="js/timeline.js" defer></script>
</head>
<body class="page-home">

  <header class="site-header">
    <h1>Ukraine Conflict <span>Data Dashboard</span></h1>
    <nav class="header-nav">
      <a href="index.html">Map</a>
      <a href="https://acleddata.com/" target="_blank">ACLED</a>
      <a href="https://www.ifw-kiel.de/publications/ukraine-support-tracker-data-6453/" target="_blank">Support Tracker</a>
    </nav>
  </header>

  <!-- Timeline -->
  <section id="timeline-section">
    <h2>Timeline of key events</h2>
    <svg id="timeline-svg"></svg>
    <div id="event-card">
      <span class="ec-close" id="ec-close">×</span>
      <div class="ec-date" id="ec-date"></div>
      <div class="ec-title" id="ec-title"></div>
      <div class="ec-desc" id="ec-desc"></div>
    </div>
  </section>

  <!-- Map -->
  <div id="map-container">
    <div id="main-layout" class="layout-default">

      <div class="map-area">
        <div id="map"></div>

        <!-- Legend overlay (switches content based on zoom) -->
        <div id="map-legend" class="map-legend">
          <h4 id="legend-title">Conflict events</h4>
          <div id="legend-body"></div>
        </div>

        <!-- Zoom hint -->
        <div id="zoom-hint">
          <span id="zoom-hint-text">Zoom out to see global aid</span>
        </div>

        <!-- Hover tooltip -->
        <div id="map-tooltip">
          <div class="tt-name" id="tt-name">–</div>
          <div class="tt-value" id="tt-value"></div>
          <div class="tt-hint" id="tt-hint"></div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
